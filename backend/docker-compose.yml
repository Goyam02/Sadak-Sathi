version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./ml_models:/app/ml_models

  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: sadak_sathi
      POSTGRES_USER: sadak
      POSTGRES_PASSWORD: sadak_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

volumes:
  pgdata:
```

